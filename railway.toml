[build]
builder = "NIXPACKS"
buildCommand = "pnpm install --frozen-lockfile=false && pnpm --filter @prospector/shared build && pnpm --filter @prospector/api prisma:generate && pnpm --filter @prospector/api build && pnpm --filter @prospector/web build"

[deploy]
startCommand = "sh scripts/start.sh"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
