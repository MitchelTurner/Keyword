[build]
builder = "NIXPACKS"
buildCommand = "pnpm install --frozen-lockfile=false && pnpm --filter @prospector/shared build && pnpm --filter @prospector/api prisma:generate && pnpm --filter @prospector/api build && test -f apps/api/dist/app.module.js && pnpm --filter @prospector/web build"

[deploy]
# Keep migrate in the start script (reliable). Healthcheck is DB-free liveness.
startCommand = "sh scripts/start.sh"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
