[phases.setup]
nixPkgs = ["nodejs_22", "openssl"]

[phases.install]
cmds = ["corepack enable", "corepack prepare pnpm@10.33.3 --activate", "pnpm install --frozen-lockfile=false"]

[phases.build]
cmds = [
  "pnpm --filter @prospector/shared build",
  "pnpm --filter @prospector/api prisma:generate",
  "pnpm --filter @prospector/api build",
  "pnpm --filter @prospector/web build",
  "test -f apps/api/dist/main.js",
  "test -f apps/web/dist/index.html"
]

[start]
cmd = "SKIP_MIGRATE=1 sh scripts/start.sh"
